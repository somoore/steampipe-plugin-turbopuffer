name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: build + standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      # make test = gofmt check + go vet + security checks + go test ./...
      # The secret-scan step in ci/checks.sh skips gracefully when
      # trufflehog/gitleaks aren't installed (GitHub does its own secret
      # scanning), so no extra tooling is needed here.
      - name: make test
        run: make test
