version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    # Group all Go module bumps into one PR to keep the noise down; security
    # bumps still open promptly.
    groups:
      go-modules:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
